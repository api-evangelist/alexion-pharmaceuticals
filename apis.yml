description: >-
  Alexion Pharmaceuticals was a global biopharmaceutical company headquartered
  in Boston, Massachusetts, focused on developing life-transforming therapies
  for rare diseases. Founded in 1992, the company pioneered complement
  inhibition therapy and developed leading treatments for rare hematological and
  neurological conditions including Soliris (eculizumab) and Ultomiris
  (ravulizumab). AstraZeneca acquired Alexion in July 2021 for $39 billion,
  and the company now operates as Alexion, AstraZeneca Rare Disease. The
  combined entity maintains research programs in complement biology, hematology,
  nephrology, neurology, metabolic disorders, cardiology, and ophthalmology.
  Alexion's GitHub organization (alxndgb) hosts research tools including
  genomic data analysis platforms, precision medicine knowledge graphs, and
  rare disease target discovery systems.
